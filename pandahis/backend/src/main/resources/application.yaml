server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: histomap-api
  datasource:
    url: jdbc:mysql://49.235.165.220:3306/histomap?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: histomap
    password: change-me
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # 远端库/代理常在默认 30min maxLifetime 之前关掉空闲连接，导致 validate 报 "connection closed"
      connection-timeout: 30000
      idle-timeout: 120000
      max-lifetime: 580000
      keepalive-time: 120000
      maximum-pool-size: 15
      minimum-idle: 2
  sql:
    init:
      mode: never
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  jackson:
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

histomap:
  wechat:
    miniapp:
      # 微信小程序登录；生产建议用环境变量覆盖 AppSecret
      app-id: ${HISTOMAP_WECHAT_MINIAPP_APP_ID:wx130cbdfbc6c4b1ab}
      app-secret: ${HISTOMAP_WECHAT_MINIAPP_APP_SECRET:bd3eaaab354744ccdfda38dee822920a}
  auth:
    jwt:
      # HS256 密钥，至少 32 字节；生产务必用环境变量覆盖
      secret: ${HISTOMAP_AUTH_JWT_SECRET:dev-only-change-me-32bytes-min________}
      expires-days: 7
    # 仅当 spring.profiles 包含 dev 时生效（启动加 --spring.profiles.active=dev），Bearer 与该字符串完全一致则视为用户 id=1
    dev-bypass-token: ${HISTOMAP_AUTH_DEV_BYPASS_TOKEN:dev-local-token}
  civ-tab:
    # 换 COS 上 civ-tab 图后递增，小程序会重新拉图（否则同 URL 会长期缓存旧图）
    image-cache-bust: "2025052401"
  home:
    rowHeight:
      k: 0.6
      minPx: 35
      maxPx: 120
  unit:
    matrix:
      highlight:
        importanceThreshold: 4
  box:
    critiques:
      maxCount: 5
    relics:
      maxCount: 3
